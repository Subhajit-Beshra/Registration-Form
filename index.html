<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <title>Registration Form</title>
</head>
<body>
    <div class="container">
        <h1>Registration Form</h1>
        <label for ="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name">
        <label for ="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email">
        <label for ="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password">
        <button type="button">Register</button>
    </div>
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } 
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const firebaseConfig = {
    apiKey: "AIzaSyD6SLN-9cW7dDwQ9G1y88UMFGjLxP1nlA4",
    authDomain: "registration-app-73294.firebaseapp.com",
    projectId: "registration-app-73294",
    storageBucket: "registration-app-73294.firebasestorage.app",
    messagingSenderId: "600676295165",
    appId: "1:600676295165:web:ad2ef2214329cef19b3994"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const button = document.querySelector("button");

    button.addEventListener("click", (e) => {
    e.preventDefault(); // 🔥 prevents reload

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
      .then(() => {
        alert("User Registered ✅");
      })
      .catch((error) => {
        alert(error.message);
      });
    }); 
</script>


</body>
</html>
